<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Community Builders Network</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: linear-gradient(135deg, var(--cbn-navy), var(--cbn-blue)); min-height:100vh; display:grid; place-items:center; padding: 20px;}
    .login-box { background:#fff; padding: 40px; border-radius: 8px; box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; }
    .login-box .brand-mark { width: 120px; height: 120px; border-radius: 50%; /*background: linear-gradient(135deg, var(--cbn-orange), var(--cbn-gold));*/ color:#fff; font-weight:800; font-size:1.2rem; display:grid; place-items:center; margin: 0 auto 20px;}
    .login-box h1 { text-align:center; font-size: 1.4rem; margin-bottom: 6px; color: var(--cbn-navy);}
    .login-box .sub { text-align:center; color: var(--cbn-gray-500); font-size: .9rem; margin-bottom: 26px;}
    .error-msg { background:#fee2e2; color:#991b1b; padding:12px 14px; border-radius:6px; border-left:4px solid #dc2626; margin-bottom: 18px; font-size:.9rem; display:none;}
    .error-msg.show { display:block; }
    .back { display:block; text-align:center; margin-top: 20px; color: var(--cbn-gray-500); font-size:.85rem;}
  </style>
</head>
<body>
  <div class="login-box">
    <span class="brand-mark"><img src="pictures/logo.jpeg"></span>
    <h1>Administrator Login</h1>
    <p class="sub">Community Builders Network — Sierra Leone</p>

    <div class="error-msg" id="loginError"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="l-user">Username</label>
        <input id="l-user" name="username" type="text" required autofocus />
      </div>
      <div class="form-group">
        <label for="l-pass">Password</label>
        <input id="l-pass" name="password" type="password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
    </form>

    <a href="index.html" class="back">← Back to website</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.classList.remove('show');
      const body = {
        username: document.getElementById('l-user').value.trim(),
        password: document.getElementById('l-pass').value
      };
      try {
        const res = await fetch('/api/admin/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.ok) {
          location.href = '/admin';
        } else {
          err.textContent = data.error || 'Login failed.';
          err.classList.add('show');
        }
      } catch (ex) {
        err.textContent = 'Network error. Is the server running?';
        err.classList.add('show');
      }
    });
  </script>
</body>
</html>
